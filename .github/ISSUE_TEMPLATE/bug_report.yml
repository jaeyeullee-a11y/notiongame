name: Bug report
description: 게임 또는 툴링 버그 제보
title: '[bug] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: 무엇이가 잘못되었나요?
      description: 재현 가능한 증상과 기대 동작을 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 단계
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 환경
      placeholder: Chrome 128 / macOS / npm run dev
  - type: textarea
    id: logs
    attributes:
      label: 로그 / 스크린샷
      render: shell
