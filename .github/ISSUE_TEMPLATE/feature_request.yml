name: Feature request
description: 기능/콘텐츠 제안
title: '[feat] '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - Combat / Waves
        - Towers / Economy
        - UI / Tutorial
        - VOC / Play log
        - Data / Balance
        - Tooling
    validations:
      required: true
